[server]
bind_addr = "0.0.0.0:3000"
# api_key = "changeme"  # uncomment to enable authentication

[limits]
max_peers = 50
max_per_stream = 20
create_per_min = 10

[cors]
# Allowed origins. Leave empty for restrictive (same-origin).
# Use ["*"] to allow all, or list specific origins.
allowed_origins = ["*"]

[logging]
# "text" or "json"
format = "text"

# To enable TLS, uncomment the section below:
# [tls]
# cert = "/path/to/cert.pem"
# key = "/path/to/key.pem"
