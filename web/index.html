<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RTSP2WebRTC</title>
<!--
  adapter.js normalises WebRTC API differences across Chrome / Edge / Firefox / Safari.
  It is maintained by Google's WebRTC team and is the industry-standard shim.
  See: https://github.com/webrtc/adapter
-->
<script src="https://webrtc.github.io/adapter/adapter-latest.js"
        onerror="console.warn('adapter.js failed to load – browser differences may surface')"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui; background: #111; color: #eee; padding: 20px; }
  h2 { margin: 16px 0 8px; font-size: 16px; color: #888; }
  .panel { max-width: 960px; margin: 0 auto; }
  .row { display: flex; gap: 8px; align-items: center; margin: 8px 0; }
  input { flex: 1; padding: 8px 12px; border: 1px solid #444; border-radius: 6px; background: #222; color: #eee; font-size: 14px; }
  button { padding: 8px 20px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; white-space: nowrap; }
  .btn-go { background: #4caf50; color: white; }
  .btn-red { background: #f44336; color: white; }
  .btn-blue { background: #2196f3; color: white; }
  video { width: 100%; max-width: 960px; background: #000; border-radius: 8px; margin-top: 12px; }
  #log { margin: 8px 0; padding: 10px 14px; border-radius: 6px; font-family: monospace; font-size: 13px; white-space: pre-wrap; max-height: 200px; overflow-y: auto; background: #1a1a2e; }
  .log-ok { color: #4caf50; } .log-err { color: #f44336; } .log-dim { color: #888; }
  hr { border: none; border-top: 1px solid #333; margin: 20px 0; }
  .stream-item { display: flex; gap: 8px; align-items: center; padding: 8px; background: #1a1a2e; border-radius: 6px; margin: 4px 0; }
  .stream-item span { flex: 1; font-size: 13px; }
</style>
</head>
<body>
<div class="panel">

<div class="row">
  <label style="white-space:nowrap">网关地址:</label>
  <input id="gateway" value="http://localhost:3000" style="max-width:260px">
</div>

<h2>&#x1f4e1; RTSP 流</h2>
<div class="row">
  <input id="rtspUrl" placeholder="rtsp://admin:password@192.168.1.1:554/stream">
  <button class="btn-blue" onclick="createStream()">创建并播放</button>
  <button class="btn-red" onclick="disconnect()">断开</button>
</div>

<div id="streamList" style="margin:8px 0;font-size:13px"></div>

<video id="video" autoplay playsinline muted></video>
<pre id="log"></pre>

</div>

<script>
let pc, ws, currentStreamId;

// ── ICE candidate queue (populated before remote desc is set) ──
let pendingCandidates = [];
let remoteDescReady = false;
let pendingLocalCandidates = [];
let localAnswerSent = false;
let localIceWaiters = [];

// ── Serialized message processing ──
// WebSocket onmessage is async; without a queue, concurrent fires can cause
// ice_candidate to be processed before setRemoteDescription completes.
// On localhost the round-trip is ~0 ms so this race is very easy to hit.
let msgQueue = Promise.resolve();

function baseUrl() {
  return document.getElementById('gateway').value.replace(/\/$/, '');
}
function wsBase() {
  return baseUrl().replace(/^http/, 'ws');
}

function t() { return new Date().toLocaleTimeString(); }
function hasIceCredentials(sdp) {
  return /(^|\r\n|\n)a=ice-ufrag:/.test(sdp) && /(^|\r\n|\n)a=ice-pwd:/.test(sdp);
}

function notifyLocalIceProgress() {
  const waiters = localIceWaiters;
  localIceWaiters = [];
  for (const resolve of waiters) resolve();
}

function waitForNextLocalIceProgress(timeoutMs = 250) {
  return new Promise(resolve => {
    let finished = false;
    const done = () => {
      if (finished) return;
      finished = true;
      clearTimeout(timer);
      const idx = localIceWaiters.indexOf(done);
      if (idx >= 0) localIceWaiters.splice(idx, 1);
      resolve();
    };
    const timer = setTimeout(done, timeoutMs);
    localIceWaiters.push(done);
  });
}

function resetLocalIceState() {
  pendingLocalCandidates = [];
  localAnswerSent = false;
  localIceWaiters = [];
}

function localCandidateMessage(candidate) {
  return {
    type: 'ice_candidate',
    candidate: candidate.candidate,
    sdpMid: candidate.sdpMid,
    sdpMLineIndex: candidate.sdpMLineIndex ?? 0,
  };
}

function flushPendingLocalCandidates() {
  if (!localAnswerSent || !ws || ws.readyState !== WebSocket.OPEN) return;
  for (const candidate of pendingLocalCandidates) {
    ws.send(JSON.stringify(candidate));
  }
  if (pendingLocalCandidates.length) {
    log(`本地 ICE candidates 已发送 (${pendingLocalCandidates.length})`, 'log-dim');
  }
  pendingLocalCandidates = [];
}

async function waitForLocalDescriptionWithIce(pc, timeoutMs = 4000) {
  const started = Date.now();
  let latest = pc.localDescription?.sdp || '';

  while (Date.now() - started < timeoutMs) {
    latest = pc.localDescription?.sdp || latest;
    if (latest && hasIceCredentials(latest)) return latest;
    if (pc.iceGatheringState === 'complete' && latest) return latest;
    await waitForNextLocalIceProgress(250);
  }

  return pc.localDescription?.sdp || latest;
}

async function buildAnswerSdpWithIce(pc) {
  // Path 1: browser-managed answer generation.
  await pc.setLocalDescription();
  let sdp = await waitForLocalDescriptionWithIce(pc);
  if (hasIceCredentials(sdp)) return sdp;

  // Path 2: explicit createAnswer fallback for engines that don't populate
  // localDescription from implicit setLocalDescription fast enough.
  if (pc.signalingState === 'have-remote-offer') {
    log('Answer 缺少 ICE 凭据，尝试显式 createAnswer 回退', 'log-dim');
    try {
      const explicitAnswer = await pc.createAnswer();
      await pc.setLocalDescription(explicitAnswer);
      sdp = await waitForLocalDescriptionWithIce(pc);
      if (hasIceCredentials(sdp)) return sdp;
    } catch (e) {
      log('显式 createAnswer 回退失败: ' + e, 'log-err');
    }
  }

  // Path 3: ask browser to restart ICE and re-read localDescription.
  if (typeof pc.restartIce === 'function') {
    log('Answer 仍缺少 ICE 凭据，尝试 restartIce()', 'log-dim');
    try {
      pc.restartIce();
      await waitForNextLocalIceProgress(500);
      sdp = await waitForLocalDescriptionWithIce(pc, 2000);
    } catch (e) {
      log('restartIce 失败: ' + e, 'log-err');
    }
  }

  return sdp;
}

function log(msg, cls) {
  const el = document.getElementById('log');
  el.textContent += t() + '  ' + msg + '\n';
  if (cls) el.style.color = cls === 'log-err' ? '#f44336' : cls === 'log-ok' ? '#4caf50' : '#888';
  else el.style.color = '';
  el.scrollTop = el.scrollHeight;
}

async function createStream() {
  disconnect();
  const url = document.getElementById('rtspUrl').value.trim();
  if (!url) return log('请输入 RTSP URL', 'log-err');

  log('POST ' + baseUrl() + '/api/streams …', 'log-dim');
  try {
    const res = await fetch(baseUrl() + '/api/streams', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    });
    const data = await res.json();
    if (!res.ok) return log('创建失败: ' + (data.message || res.status), 'log-err');
    currentStreamId = data.stream_id;
    log('流已创建: ' + currentStreamId, 'log-ok');
    connect(currentStreamId);
  } catch (e) {
    log('请求失败: ' + e, 'log-err');
  }
}

async function handleMessage(data) {
  const msg = JSON.parse(data);
  log('← ' + msg.type, 'log-dim');

  switch (msg.type) {
    case 'connected':
      remoteDescReady = false;
      pendingCandidates = [];
      resetLocalIceState();
      pc = new RTCPeerConnection({
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
      });
      pc.ontrack = (e) => {
        log('视频轨道就绪: ' + e.track.kind, 'log-ok');
        document.getElementById('video').srcObject = e.streams[0];
      };
      pc.onicecandidate = (e) => {
        notifyLocalIceProgress();
        if (e.candidate) {
          const message = localCandidateMessage(e.candidate);
          if (localAnswerSent && ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify(message));
          } else {
            pendingLocalCandidates.push(message);
          }
        } else {
          log('本地 ICE gathering 完成', 'log-dim');
        }
      };
      pc.onicegatheringstatechange = () => {
        log('本地 ICE gathering: ' + pc.iceGatheringState, 'log-dim');
        notifyLocalIceProgress();
        if (localAnswerSent) flushPendingLocalCandidates();
      };
      pc.onconnectionstatechange = () => {
        log('连接状态: ' + pc.connectionState,
          pc.connectionState === 'connected' ? 'log-ok' :
          pc.connectionState === 'failed' ? 'log-err' : 'log-dim');
      };
      pc.oniceconnectionstatechange = () => {
        log('ICE 状态: ' + pc.iceConnectionState, 'log-dim');
      };
      break;

    case 'sdp_offer':
      log(
        `收到 SDP offer，设置远端描述… (ice-ufrag=${/(^|\r\n|\n)a=ice-ufrag:/.test(msg.sdp)}, ice-pwd=${/(^|\r\n|\n)a=ice-pwd:/.test(msg.sdp)})`,
        'log-ok'
      );
      await pc.setRemoteDescription({ type: 'offer', sdp: msg.sdp });
      const localSdp = await buildAnswerSdpWithIce(pc);
      const hasIceUfrag = /(^|\r\n|\n)a=ice-ufrag:/.test(localSdp);
      const hasIcePwd = /(^|\r\n|\n)a=ice-pwd:/.test(localSdp);
      localAnswerSent = true;
      ws.send(JSON.stringify({ type: 'sdp_answer', sdp: localSdp }));
      flushPendingLocalCandidates();
      if (!hasIceUfrag || !hasIcePwd) {
        const compact = (localSdp || '').slice(0, 600).replace(/\r\n|\n/g, ' | ');
        log(`Answer SDP 片段(前600): ${compact}`, 'log-err');
      }
      log(
        `Answer 已发送 (ice-ufrag=${hasIceUfrag}, ice-pwd=${hasIcePwd}, iceGathering=${pc.iceGatheringState}, signaling=${pc.signalingState}, localType=${pc.localDescription?.type || 'null'})`,
        hasIceUfrag && hasIcePwd ? 'log-dim' : 'log-err'
      );

      // Remote desc is now in place — flush any queued ICE candidates
      remoteDescReady = true;
      for (const c of pendingCandidates) {
        try { await pc.addIceCandidate(new RTCIceCandidate(c)); }
        catch (e) { log('addIceCandidate(queued) 失败: ' + e, 'log-err'); }
      }
      pendingCandidates = [];
      break;

    case 'ice_candidate':
      // Build a proper RTCIceCandidateInit from whatever shape the server sends
      const init = msg.candidate && typeof msg.candidate === 'object'
        ? msg.candidate                                      // already an object
        : { candidate: msg.candidate, sdpMid: msg.sdpMid, sdpMLineIndex: msg.sdpMLineIndex ?? 0 };

      if (!init?.candidate) break;

      // Firefox requires sdpMLineIndex to be a number (not null/undefined)
      if (init.sdpMLineIndex == null) init.sdpMLineIndex = 0;

      if (remoteDescReady) {
        try { await pc.addIceCandidate(new RTCIceCandidate(init)); }
        catch (e) { log('addIceCandidate 失败: ' + e, 'log-err'); }
      } else {
        // Remote description not set yet — queue for later
        pendingCandidates.push(init);
        log('ICE candidate 暂存 (' + pendingCandidates.length + ')', 'log-dim');
      }
      break;

    case 'error':
      log('错误: ' + msg.message, 'log-err');
      break;
  }
}

function connect(streamId) {
  const wsUrl = `${wsBase()}/ws?stream=${streamId}`;
  log('WebSocket 连接: ' + wsUrl, 'log-dim');

  msgQueue = Promise.resolve();   // reset queue on new connection
  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    log('已连接，请求流...', 'log-ok');
    ws.send(JSON.stringify({ type: 'request_stream' }));
  };

  // Serialize processing: each message is chained onto the previous promise,
  // so ice_candidate never runs concurrently with the sdp_offer handler.
  ws.onmessage = (event) => {
    msgQueue = msgQueue.then(() => handleMessage(event.data)).catch(e => {
      log('消息处理异常: ' + e, 'log-err');
    });
  };

  ws.onerror = () => log('WebSocket 错误', 'log-err');
  ws.onclose = (e) => log(`WebSocket 断开 (code=${e.code})`, 'log-dim');
}

function disconnect() {
  if (pc) { pc.close(); pc = null; }
  if (ws) { ws.close(); ws = null; }
  remoteDescReady = false;
  pendingCandidates = [];
  resetLocalIceState();
  document.getElementById('video').srcObject = null;
  log('已断开', 'log-dim');
}

// ── Stream list (auto-fetch from API) ──

async function refreshStreams() {
  try {
    const res = await fetch(baseUrl() + '/api/streams');
    const data = await res.json();
    const el = document.getElementById('streamList');
    if (!data.streams.length) {
      el.innerHTML = '<span style="color:#888">无可用流</span>';
      return;
    }
    el.innerHTML = data.streams.map(s =>
      `<span class="stream-item">
        <span>${s.id}${s.name ? ' · '+s.name : ''} ${s.dynamic?'🔧':'⚙'}</span>
        <span style="color:#888">${s.connected ? s.subscribers + ' 在线' : '空闲'}</span>
        <button onclick="connectDirect('${s.id}')" style="padding:4px 12px;font-size:12px;background:#4caf50;color:#fff;border:none;border-radius:4px;cursor:pointer">播放</button>
      </span>`
    ).join('');
  } catch(e) {}
}

function connectDirect(id) {
  disconnect();
  currentStreamId = id;
  connect(id);
}

refreshStreams();
setInterval(refreshStreams, 5000);
</script>
</body>
</html>
